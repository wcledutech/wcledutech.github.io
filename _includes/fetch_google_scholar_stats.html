<script>
    $(document).ready(function () {
        function getMetric(data, keys) {
            for (var i = 0; i < keys.length; i += 1) {
                if (data[keys[i]] !== undefined && data[keys[i]] !== null) {
                    return data[keys[i]];
                }
            }
            return null;
        }

        function setTextById(id, value, prefix) {
            if (value === null || value === undefined || value === '') {
                return;
            }
            var element = document.getElementById(id);
            if (element) {
                element.textContent = (prefix || '') + value;
            }
        }

        function parseMetricNumber(value) {
            if (value === null || value === undefined || value === '') {
                return null;
            }
            var cleaned = String(value).replace(/,/g, '').trim();
            if (!cleaned || !/^\d+$/.test(cleaned)) {
                return null;
            }
            return Number(cleaned);
        }

        function currentMetricNumber(id) {
            var element = document.getElementById(id);
            return element ? parseMetricNumber(element.textContent) : null;
        }

        function monotonicMetric(id, remoteValue, fallbackId) {
            var remoteNumber = parseMetricNumber(remoteValue);
            if (remoteNumber === null) {
                return null;
            }

            var currentNumber = currentMetricNumber(id);
            var fallbackNumber = fallbackId ? currentMetricNumber(fallbackId) : null;
            var floorNumber = Math.max(
                currentNumber === null ? -Infinity : currentNumber,
                fallbackNumber === null ? -Infinity : fallbackNumber
            );

            return remoteNumber < floorNumber ? floorNumber : remoteNumber;
        }

        function setMetricById(id, value, fallbackId) {
            setTextById(id, monotonicMetric(id, value, fallbackId));
        }

        function applyScholarMetrics(data) {
            var totalCitation = getMetric(data, ['citedby', 'citations', 'total_citations']);
            var totalCitation5y = getMetric(data, ['citedby5y', 'citedby_5y', 'citations5y']);
            var hIndex = getMetric(data, ['hindex', 'h_index']);
            var hIndex5y = getMetric(data, ['hindex5y', 'h_index5y']);
            var i10Index = getMetric(data, ['i10index', 'i10_index']);
            var i10Index5y = getMetric(data, ['i10index5y', 'i10_index5y']);

            setMetricById('gs-citations', totalCitation);
            setMetricById('gs-citations-5y', totalCitation5y);
            setMetricById('gs-hindex', hIndex);
            setMetricById('gs-hindex-5y', hIndex5y);
            setMetricById('gs-i10index', i10Index);
            setMetricById('gs-i10index-5y', i10Index5y);
            setMetricById('total_cit', totalCitation, 'gs-citations');
            setTextById('gs-updated', data['updated'], 'Google Scholar metrics last updated: ');

            var citationEles = document.getElementsByClassName('show_paper_citations');
            Array.prototype.forEach.call(citationEles, function (element) {
                var paperId = element.getAttribute('data');
                if (data['publications'] && data['publications'][paperId]) {
                    var numCitations = data['publications'][paperId]['num_citations'];
                    element.textContent = '| Citations: ' + numCitations;
                }
            });
        }

        function loadScholarMetrics(urls, index) {
            if (index >= urls.length) {
                if (window.console && console.warn) {
                    console.warn('Google Scholar metrics could not be loaded from any source.');
                }
                return;
            }

            $.getJSON(urls[index], applyScholarMetrics).fail(function (_jqxhr, textStatus, error) {
                if (window.console && console.warn) {
                    console.warn('Google Scholar metrics source failed:', urls[index], textStatus, error);
                }
                loadScholarMetrics(urls, index + 1);
            });
        }

        var repository = '{{ site.repository }}';
        var dailyCacheKey = new Date().toISOString().slice(0, 10);
        var statsUrls = [
            'https://raw.githubusercontent.com/' + repository + '/google-scholar-stats/gs_data.json?v=' + dailyCacheKey,
            'https://cdn.jsdelivr.net/gh/' + repository + '@google-scholar-stats/gs_data.json?v=' + dailyCacheKey
        ];

        {% if site.google_scholar_stats_use_cdn %}
        statsUrls.reverse();
        {% endif %}

        loadScholarMetrics(statsUrls, 0);
    });
</script>
