name: Update Google Scholar Stats

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/google-scholar-stats.yml"
      - "google_scholar_crawler/**"

permissions:
  contents: write

concurrency:
  group: google-scholar-stats
  cancel-in-progress: true

jobs:
  update-google-scholar-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_SCHOLAR_ID: C_PHTMsAAAAJ

    steps:
      - name: Check out site
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install crawler dependencies
        run: python -m pip install -r google_scholar_crawler/requirements.txt

      - name: Fetch previous published stats
        run: |
          set -euo pipefail
          mkdir -p previous_stats
          if git ls-remote --exit-code --heads origin google-scholar-stats >/dev/null 2>&1; then
            git fetch --depth=1 origin google-scholar-stats
            git show FETCH_HEAD:gs_data.json > previous_stats/gs_data.json || true
            git show FETCH_HEAD:gs_data_shieldsio.json > previous_stats/gs_data_shieldsio.json || true
          fi

      - name: Fetch Google Scholar profile
        timeout-minutes: 8
        env:
          PREVIOUS_GS_DATA_PATH: previous_stats/gs_data.json
          SCHOLAR_FETCH_ATTEMPTS: 2
          SCHOLARLY_TIMEOUT_SECONDS: 150
          PROFILE_PAGE_TIMEOUT_SECONDS: 30
          MAX_PREVIOUS_DATA_AGE_DAYS: 3
        run: python google_scholar_crawler/main.py

      - name: Publish stats branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          cp results/gs_data.json "$publish_dir/gs_data.json"
          cp results/gs_data_shieldsio.json "$publish_dir/gs_data_shieldsio.json"
          cd "$publish_dir"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b google-scholar-stats
          git add gs_data.json gs_data_shieldsio.json
          git commit -m "Update Google Scholar stats"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin google-scholar-stats

      - name: Fail loudly if Scholar metrics are stale
        run: |
          python - <<'PY'
          import json
          import sys

          with open("results/gs_data.json", "r", encoding="utf-8") as infile:
              data = json.load(infile)

          status = data.get("update_status")
          if data.get("metric_regression_guard"):
              print("::warning::Google Scholar returned lower metrics than the previous published data. The no-downgrade guard kept the previous values.")

          if status == "stale-previous-data-fallback":
              age = data.get("fallback_age_days")
              max_age = data.get("fallback_max_age_days")
              print(f"::error::Google Scholar metrics have not refreshed for {age} days, exceeding the {max_age}-day stale-data limit.")
              sys.exit(1)
          PY
